name: Deploy

on:
  push:
    tags:
      - "v*.*.*"        # trigger on version tags like v1.2.3
  workflow_dispatch:    # allow manual triggers from the Actions UI
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: production
        type: choice
        options: [production, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build release binary ───────────────────────────────────────────────────
  build:
    name: Build release binary
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for git describe

      - name: Determine version
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/voiddb-linux-amd64 \
            ./cmd/voiddb

      - name: Build (linux/arm64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/voiddb-linux-arm64 \
            ./cmd/voiddb

      - name: Build (windows/amd64)
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/voiddb-windows-amd64.exe \
            ./cmd/voiddb

      - name: Build (darwin/amd64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/voiddb-darwin-amd64 \
            ./cmd/voiddb

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: voiddb-binaries
          path: dist/
          retention-days: 7

  # ── Build & push Docker image ──────────────────────────────────────────────
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.build.outputs.version }}

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: voiddb-binaries
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  # ── Deploy to server via SSH ───────────────────────────────────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: |
      (startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-rc')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: ${{ vars.VOID_URL }}

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: voiddb-binaries
          path: dist/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            # Create directories.
            mkdir -p /opt/voiddb/bin /opt/voiddb/data /opt/voiddb/blob /opt/voiddb/backups

            # Stop the running service (ignore errors if not running).
            sudo systemctl stop voiddb 2>/dev/null || true

      - name: Upload binary
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: dist/voiddb-linux-amd64
          target: /opt/voiddb/bin/
          overwrite: true

      - name: Start service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            chmod +x /opt/voiddb/bin/voiddb-linux-amd64
            ln -sf /opt/voiddb/bin/voiddb-linux-amd64 /opt/voiddb/bin/voiddb
            sudo systemctl start voiddb
            sudo systemctl status voiddb --no-pager

  # ── Deploy staging ─────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build
    if: |
      (startsWith(github.ref, 'refs/tags/') && contains(github.ref, '-rc')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: ${{ vars.VOID_STAGING_URL }}

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: voiddb-binaries
          path: dist/

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /opt/voiddb-staging/bin
            sudo systemctl stop voiddb-staging 2>/dev/null || true

      - name: Upload binary
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: dist/voiddb-linux-amd64
          target: /opt/voiddb-staging/bin/
          overwrite: true

      - name: Start staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chmod +x /opt/voiddb-staging/bin/voiddb-linux-amd64
            ln -sf /opt/voiddb-staging/bin/voiddb-linux-amd64 /opt/voiddb-staging/bin/voiddb
            sudo systemctl start voiddb-staging
