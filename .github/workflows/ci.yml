name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ── Go server ──────────────────────────────────────────────────────────────
  go-test:
    name: Go build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: CGO_ENABLED=0 go build ./...

      - name: Test (unit)
        run: go test ./internal/... -v -count=1 -timeout 60s

      - name: Test (race detector)
        run: go test -race ./internal/engine/... -count=1 -timeout 60s

      - name: Benchmarks (smoke)
        run: go test ./internal/engine/... -bench=. -benchtime=1s -run "^$" -timeout 120s

  # ── Go ORM ─────────────────────────────────────────────────────────────────
  go-orm:
    name: Go ORM build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: orm/go

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

  # ── TypeScript ORM ─────────────────────────────────────────────────────────
  ts-orm:
    name: TypeScript ORM build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: orm/typescript

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: orm/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build package
        run: npm run build

  # ── Admin panel ────────────────────────────────────────────────────────────
  admin:
    name: Admin panel build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:7700

  # ── Security audit ─────────────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit (TypeScript ORM)
        working-directory: orm/typescript
        run: npm audit --audit-level=high || true

      - name: npm audit (admin)
        working-directory: admin
        run: npm audit --audit-level=high || true
